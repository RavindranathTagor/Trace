# Render.com blueprint — free Docker web service for Trace.
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick the repo.
# Then set the secret env vars (marked sync:false) in the Render dashboard.
services:
  - type: web
    name: trace
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "3001"
      - key: COGNEE_ENABLED
        value: "true"
      - key: COGNEE_DATASET
        value: trace-demo
      - key: COGNEE_AUTH
        value: "false"
      # Cognee Cloud host is public (not a secret) — safe to inline.
      - key: COGNEE_BASE_URL
        value: https://tenant-521d803b-ad39-4ba7-a627-9d3e72596edc.aws.cognee.ai
      - key: NEXT_PUBLIC_ELEVENLABS_AGENT_ID
        value: agent_5701kwbnewv0fw09sa7h2r2y3sr4
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      # ── Secrets: set these in the dashboard, do NOT commit them ──
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_TENANT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # No COGNEE_FALLBACK_BASE_URL in the cloud (there's no local :8000 there).
